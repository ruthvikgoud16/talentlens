ai_usage_summary: |
  Used Claude for architectural discussion, schema analysis, and code review.
  Claude read the actual candidates.jsonl file to confirm the real data schema
  before any code was written. No candidate data was fed to any LLM during
  ranking. All scoring logic runs locally with no API calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  TalentLens is a recruiter-style candidate ranking engine built around signals
  explicitly mentioned in the job description. Four weighted scoring engines:
  Career Evidence & Trajectory (30%) rewards production deployments in
  retrieval/search/ranking and penalizes consulting-only backgrounds explicitly
  named as disqualifiers in the JD. Recruitability Index (35%) weights candidate
  recency, response rate, notice period, and open-to-work status — built on the
  JD's own statement that an inactive candidate is not actually available.
  Explicit Skill Relevance (20%) separates must-have skills (embeddings, vector
  databases, retrieval) from nice-to-haves using proficiency and duration as
  quality signals, not just keyword presence. Semantic Match (15%) uses TF-IDF
  cosine similarity fitted once across all 100,000 candidates. A contradiction
  detection engine applies penalties for honeypot profiles where headline claims
  are unsupported by career history. Runtime is approximately 3 minutes for
  100,000 candidates on CPU with 16GB RAM.

